{% set name = "mapchete-eo" %}
{% set version = "2026.3.0" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/mapchete_eo-{{ version }}.tar.gz
  sha256: 374be34b937c149f2b99dfad048c5e6a52b044e25326f1ed814a535a2748bcd3

build:
  script: {{ PYTHON }} -m pip install . -vv
  number: 0
  noarch: python

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - click
    - croniter
    - lxml
    - mapchete >=2025.6.0
    - opencv
    - pillow
    - pydantic
    - pygeofilter
    - pystac >=1.12.2
    - pystac-client >=0.7.5
    - retry
    - rtree
    - scipy
    - tqdm
    - xarray

test:
  imports:
    - mapchete_eo
  commands:
    - pip check
    - mapchete eo --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/mapchete/mapchete-eo
  summary: Earth Observation–specific driver extensions for Mapchete
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ungarj
    - Scartography
